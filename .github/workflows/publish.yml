name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      test_pypi:
        description: "Upload to TestPyPI instead of PyPI"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust tests
        run: cargo test --workspace

  build:
    name: Build wheel (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin and zig
        run: pip install maturin ziglang

      - name: Build wheel
        run: maturin build --release --zig -m crates/quiver-python/Cargo.toml --target ${{ matrix.target }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/quiver_vector_db-*.whl

  publish:
    name: Publish to ${{ inputs.test_pypi && 'TestPyPI' || 'PyPI' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Publish to TestPyPI
        if: ${{ inputs.test_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ !inputs.test_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
